name: Build Kyber OS ISO

on:
  # Trigger manually from the Actions tab
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the built ISO to GitHub Releases
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when publishing manually (e.g. v1.0.0)
        required: false
        type: string
  # Trigger automatically on version tags (e.g. v1.0.0)
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Build the ISO inside an Arch Linux container
  # ──────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      # mkarchiso needs loop devices, mounts and squashfs – privileged mode
      # provides the required kernel capabilities on the Ubuntu host.
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialise pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install archiso and AUR build tools
        run: |
          # Enable multilib in the container so lib32 packages can be installed
          sed -i '/^#\[multilib\]/,/^#Include/{s/^#//}' /etc/pacman.conf
          pacman -Syu --noconfirm archiso grub base-devel git sudo
          # Create an unprivileged user for makepkg (AUR builds must not run as root)
          useradd -m aurbuilder
          echo "aurbuilder ALL=(ALL) NOPASSWD: /usr/bin/pacman" >> /etc/sudoers

      - name: Prepare Kyber OS profile
        run: |
          # Start from the official releng profile that ships with archiso
          cp -r /usr/share/archiso/configs/releng/ /tmp/kyber-profile

          # ── Patch identity fields in profiledef.sh ──────────────────
          sed -i 's|^iso_name=.*|iso_name="kyber-os"|'                           /tmp/kyber-profile/profiledef.sh
          sed -i 's|^iso_label=.*|iso_label="KYBER_OS_$(date +%Y%m)"|'           /tmp/kyber-profile/profiledef.sh
          sed -i 's|^iso_publisher=.*|iso_publisher="Kyber OS"|'                  /tmp/kyber-profile/profiledef.sh
          sed -i 's|^iso_application=.*|iso_application="Kyber OS Live/Install Medium"|' \
                                                                                   /tmp/kyber-profile/profiledef.sh

          # ── Switch UEFI bootloader to GRUB for VirtualBox compatibility ────
          # systemd-boot can fail with "CPU not supported" in VirtualBox; GRUB
          # provides wider EFI compatibility and the releng grub.cfg no longer
          # contains a cpuid long-mode check.
          sed -i "s|'uefi.systemd-boot'|'uefi.grub'|" /tmp/kyber-profile/profiledef.sh

          # ── Enable multilib in profile pacman.conf ───────────────────
          sed -i '/^#\[multilib\]/,/^#Include/{s/^#//}' /tmp/kyber-profile/pacman.conf

          # ── Append extra packages (skip unavailable ones) ────────────
          while IFS= read -r pkg; do
            # Skip comments and blank lines
            case "$pkg" in
              ''|\#*) continue ;;
            esac

            if pacman -Si "$pkg" >/dev/null 2>&1; then
              echo "$pkg" >> /tmp/kyber-profile/packages.x86_64
            else
              echo "::warning::Skipping unavailable package: $pkg"
            fi
          done < iso-profile/extra-packages.x86_64

          # ── Deploy custom airootfs overlay files ─────────────────────
          cp -a iso-profile/airootfs/. /tmp/kyber-profile/airootfs/
          chmod 755 /tmp/kyber-profile/airootfs/etc/profile.d/kyber-welcome.sh

          # ── Embed the installer ──────────────────────────────────────
          mkdir -p /tmp/kyber-profile/airootfs/root
          cp install.sh /tmp/kyber-profile/airootfs/root/install.sh
          chmod 755  /tmp/kyber-profile/airootfs/root/install.sh

      - name: Build AUR packages
        run: |
          mkdir -p /tmp/aur-repo

          while IFS= read -r pkg; do
            case "$pkg" in ''|\#*) continue ;; esac

            # Clone PKGBUILD from AUR
            if ! sudo -u aurbuilder git clone "https://aur.archlinux.org/${pkg}.git" "/tmp/aur-build-${pkg}" 2>/dev/null; then
              echo "::warning::Skipping AUR package not found: $pkg"
              continue
            fi

            # Build the package and install any declared dependencies
            if sudo -u aurbuilder bash -c "cd /tmp/aur-build-${pkg} && makepkg -s --noconfirm --noprogressbar"; then
              find "/tmp/aur-build-${pkg}" -name '*.pkg.tar.*' -exec cp {} /tmp/aur-repo/ \;
            else
              echo "::warning::Failed to build AUR package: $pkg"
            fi
          done < iso-profile/aur-packages.x86_64

          # Wire up the local repo only when package files are present
          mapfile -t pkg_files < <(find /tmp/aur-repo -name '*.pkg.tar.*' | sort)
          if [ "${#pkg_files[@]}" -gt 0 ]; then
            repo-add /tmp/aur-repo/kyber-aur.db.tar.gz "${pkg_files[@]}"

            # Prepend [kyber-aur] before [core] so it takes highest priority
            sed -i '1s|^|[kyber-aur]\nSigLevel = Optional TrustAll\nServer = file:///tmp/aur-repo\n\n|' \
              /tmp/kyber-profile/pacman.conf

            # Extract the actual installed binary package names from the built files
            for pkgfile in "${pkg_files[@]}"; do
              pacman -Qp "$pkgfile" 2>/dev/null | awk '{print $1}'
            done >> /tmp/kyber-profile/packages.x86_64
          fi

      - name: Build ISO
        run: mkarchiso -v -w /tmp/archiso-work -o /tmp/out /tmp/kyber-profile

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyber-os-iso
          path: /tmp/out/*.iso
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # 2. Publish to GitHub Releases (tag pushes or manual publish requests)
  # ──────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # Tag pushes publish the pushed tag; manual runs use the validated release_tag input.
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag }}

    steps:
      - name: Validate manual release settings
        if: github.event_name == 'workflow_dispatch'
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -z "$MANUAL_RELEASE_TAG" ]; then
            echo "::error::release_tag input is required when publish_release is enabled. Please provide a valid semver tag (e.g. v1.0.0) or disable publishing."
            exit 1
          fi

          python - <<'PY'
          import re
          import sys
          import os

          tag = os.environ["MANUAL_RELEASE_TAG"]
          semver = re.compile(
              r"^v"
              r"(0|[1-9]\d*)\."
              r"(0|[1-9]\d*)\."
              r"(0|[1-9]\d*)"
              r"(?:-((?:0|[1-9]\d*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)"
              r"(?:\.(?:0|[1-9]\d*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?"
              r"(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$"
          )

          if not semver.fullmatch(tag):
              print(
                  "::error::release_tag must be a valid semver tag starting with v (e.g. v1.0.0, v2.1.0-beta, v3.0.0+build.123).",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Download ISO artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: kyber-os-iso
          path: ./out

      - name: Create or update GitHub Release and attach ISO
        run: |
          cat > /tmp/release-notes.md <<EOF
          ## Kyber OS Live ISO – $RELEASE_TAG

          Flash this ISO to a USB drive (e.g. with \`dd\` or Ventoy), boot from it, then run:

          \`\`\`bash
          /root/install.sh
          \`\`\`

          May the Source be with you.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Kyber OS $RELEASE_TAG" \
              --notes-file /tmp/release-notes.md
            gh release upload "$RELEASE_TAG" ./out/*.iso --clobber
          else
            gh release create "$RELEASE_TAG" \
              --title "Kyber OS $RELEASE_TAG" \
              --notes-file /tmp/release-notes.md \
              ./out/*.iso
          fi
