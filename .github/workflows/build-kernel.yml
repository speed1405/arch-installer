name: Build Kyber OS Kernel

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'linux-kyberos/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Build Environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel curl jq git sudo
          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builduser:builduser .

      - name: Fetch Latest Kernel Version
        id: kernel_version
        run: |
          KERNEL_VERSION=$(curl -s https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          echo "version=$KERNEL_VERSION" >> $GITHUB_OUTPUT
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV

      - name: Generate PKGBUILD
        run: |
          cd linux-kyberos
          sudo -u builduser ./generate-pkgbuild.sh
          cat PKGBUILD

      - name: Build Arch Package (linux-kyberos)
        run: |
          cd linux-kyberos
          sudo -u builduser MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm
        env:
          PKGEXT: '.pkg.tar.zst'

      - name: Generate Pacman Repository DB
        run: |
          cd linux-kyberos
          # Download existing DB if it exists so we can append to it
          mkdir -p repo
          cd repo
          curl -L -O -f https://github.com/${{ github.repository }}/releases/download/kyberos-repo/kyberos.db.tar.zst || echo "No existing DB found"
          curl -L -O -f https://github.com/${{ github.repository }}/releases/download/kyberos-repo/kyberos.files.tar.zst || echo "No existing files DB found"
          cp ../*.pkg.tar.zst .
          repo-add -n -R kyberos.db.tar.zst *.pkg.tar.zst
          cd ..

      - name: List Output Files
        run: ls -la linux-kyberos/*.pkg.tar.zst

      - name: Create Git Tag
        uses: actions/github-script@v6
        id: create_tag
        with:
          script: |
            const tag = `v${process.env.KERNEL_VERSION}-kyberos`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
            } catch (err) {
              console.log(`Tag ${tag} might already exist: ${err}`);
            }
            core.setOutput('tag_name', tag);

      - name: Create Release and Upload Packages
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "kyberos-repo"
          name: "Kyber OS Kernel Repository"
          body: "Automated persistent repository for the `linux-kyberos` custom kernel.\n\nTo use, add the following to `/etc/pacman.conf`:\n\n```ini\n[kyberos]\nServer = https://github.com/${{ github.repository }}/releases/download/kyberos-repo/\n```"
          files: |
            linux-kyberos/repo/*.pkg.tar.zst
            linux-kyberos/repo/kyberos.db*
            linux-kyberos/repo/kyberos.files*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
